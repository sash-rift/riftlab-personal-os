<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1200" height="780" fill="#0E1B2E"/>

  <!-- Step 1: install prompt -->
  <rect x="370" y="28" width="460" height="54" rx="10" fill="#13243A" stroke="#46586E" stroke-width="1.5"/>
  <text x="600" y="61" fill="#E9EFF7" font-size="18" text-anchor="middle">Paste one prompt  &#8594;  5-minute interview</text>

  <!-- connector to OS -->
  <line x1="600" y1="82" x2="600" y2="120" stroke="#5A6E86" stroke-width="2"/>
  <polygon points="600,128 594,116 606,116" fill="#5A6E86"/>

  <!-- OS node -->
  <rect x="340" y="128" width="520" height="106" rx="12" fill="#16293F" stroke="#ECB63F" stroke-width="2"/>
  <text x="600" y="164" fill="#ECB63F" font-size="23" font-weight="bold" text-anchor="middle">YOUR AI OS</text>
  <text x="600" y="193" fill="#E9EFF7" font-size="16" text-anchor="middle">identity  &#183;  10 skills  &#183;  11 agents</text>
  <text x="600" y="216" fill="#8FA0B6" font-size="14" text-anchor="middle">installed to ~/.claude</text>

  <!-- bus connector -->
  <line x1="600" y1="234" x2="600" y2="266" stroke="#5A6E86" stroke-width="2"/>
  <line x1="330" y1="266" x2="870" y2="266" stroke="#5A6E86" stroke-width="2"/>
  <line x1="330" y1="266" x2="330" y2="300" stroke="#5A6E86" stroke-width="2"/>
  <line x1="870" y1="266" x2="870" y2="300" stroke="#5A6E86" stroke-width="2"/>
  <polygon points="330,308 324,296 336,296" fill="#5A6E86"/>
  <polygon points="870,308 864,296 876,296" fill="#5A6E86"/>

  <!-- LEFT panel: Cowork -->
  <rect x="80" y="308" width="500" height="424" rx="12" fill="#122236" stroke="#28415A" stroke-width="1.5"/>
  <rect x="80" y="308" width="7" height="424" rx="3" fill="#36C5B0"/>
  <text x="112" y="346" fill="#5EE0CF" font-size="21" font-weight="bold">COWORK</text>
  <text x="250" y="346" fill="#8FA0B6" font-size="14">everyday  &#183;  zero setup</text>
  <line x1="112" y1="362" x2="548" y2="362" stroke="#1E3850" stroke-width="1"/>

  <text x="112" y="404" fill="#E9EFF7" font-size="16">Your identity loads automatically</text>
  <text x="112" y="448" fill="#E9EFF7" font-size="16" font-weight="bold">8 skills work here:</text>
  <text x="112" y="482" fill="#C7D3E1" font-size="15">aim-coach &#183; daily-brief &#183; meeting-prep</text>
  <text x="112" y="510" fill="#C7D3E1" font-size="15">humanize &#183; internal-comms</text>
  <text x="112" y="538" fill="#C7D3E1" font-size="15">docx &#183; pdf &#183; pptx</text>
  <text x="112" y="600" fill="#7B8AA0" font-size="15">custom agents &#8212; not available here</text>

  <!-- RIGHT panel: Code -->
  <rect x="620" y="308" width="500" height="424" rx="12" fill="#122236" stroke="#5A4A22" stroke-width="1.5"/>
  <rect x="1113" y="308" width="7" height="424" rx="3" fill="#ECB63F"/>
  <text x="652" y="346" fill="#F2C75A" font-size="21" font-weight="bold">CODE TAB / CLI</text>
  <text x="852" y="346" fill="#8FA0B6" font-size="14">full power</text>
  <line x1="652" y1="362" x2="1088" y2="362" stroke="#3A3420" stroke-width="1"/>

  <text x="652" y="404" fill="#E9EFF7" font-size="16">Everything Cowork has, plus:</text>
  <text x="652" y="448" fill="#C7D3E1" font-size="15"><tspan fill="#F2C75A" font-weight="bold">deep-research</tspan> &#8212; 4-agent research team</text>
  <text x="652" y="482" fill="#C7D3E1" font-size="15"><tspan fill="#F2C75A" font-weight="bold">decision-council</tspan> &#8212; CMO/CFO/COO/GC board</text>
  <text x="652" y="526" fill="#C7D3E1" font-size="15">@researcher &#183; @critical-thinker &#183; @coach</text>
  <text x="652" y="600" fill="#5EE0CF" font-size="15">the real multi-agent power</text>

  <!-- footer -->
  <text x="600" y="762" fill="#8FA0B6" font-size="15" text-anchor="middle">One install.  Two surfaces.  Code is the upgrade.</text>
</svg>
